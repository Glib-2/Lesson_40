<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .backdrop {
            position: fixed;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 253, 241, 0.5);
        }

        .backdrop.is-hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .modal {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            min-width: 400px;
            min-height: 200px;
            padding: 24px;
            background-color: #f2f2f2;
            border-radius: 8px;
            box-shadow: 0 8px 24px rgba(255,0,0);
        }
    </style>
</head>
<body>
    <button class="btn-open" data-modal-open>Відкрити</button>

    <div class="backdrop is-hidden" data-modal>
        <div class="modal">
            <button class="btn-close" data-modal-close>✕</button>

            <div class="position">
                <h2>Привіт</h2>
                <p>Йди геть</p>
            </div>

        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
